<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión – ExtinGuard</title>
  <link rel="stylesheet" href="inicio_de_sesion.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="contenedor">

    <!-- Panel izquierdo decorativo -->
    <div class="panel-izquierdo">
      <img src="logo.png" alt="Logo" onerror="this.style.display='none'" class="logo"/>
      <h1>ExtinGuard</h1>
      <p>Tu plataforma de seguridad contra incendios. Gestiona tus equipos, contratos y reportes en un solo lugar.</p>
    </div>

    <!-- Formulario de login -->
    <div class="panel-derecho">
      <div class="form-caja">
        <h2>Bienvenido de vuelta</h2>
        <p class="subtitulo">Ingresa tus datos para continuar</p>

        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" />
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <div id="mensaje-error" class="mensaje-error" style="display:none;"></div>

        <button class="btn-submit" onclick="iniciarSesion()">Iniciar Sesión</button>

        <p class="link-abajo">
          ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </p>
        <p class="link-abajo">
          <a href="index.html">← Volver al inicio</a>
        </p>
      </div>
    </div>

  </div>

  <script src="inicio_de_sesion.js"></script>
</body>
</html>
